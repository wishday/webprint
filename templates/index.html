<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web打印服务</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .upload-area {
            border: 2px dashed #cbd5e1;
            transition: all 0.3s ease;
        }
        .upload-area:hover, .upload-area.dragover {
            border-color: #3b82f6;
            background-color: #eff6ff;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-bold text-gray-800 mb-2">🖨️ Web打印服务</h1>
            <p class="text-gray-600">基于CUPS的网络打印解决方案</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- 左侧：预览和上传 -->
            <div class="lg:col-span-2 space-y-6">
                <div class="bg-white rounded-xl shadow-md p-6">
                    <h2 class="text-xl font-semibold text-gray-800 mb-4">📁 文件预览与上传</h2>
                    
                    <div id="uploadPreviewContainer" class="upload-area rounded-lg overflow-hidden relative" style="min-height: 450px;">
                        <!-- 上传状态 -->
                        <div id="uploadState" class="absolute inset-0 flex flex-col items-center justify-center cursor-pointer p-8">
                            <svg class="h-20 w-20 text-gray-300 mb-4" fill="none" viewBox="0 0 48 48" stroke="currentColor">
                                <path stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02"/>
                            </svg>
                            <p class="text-lg font-medium text-gray-600 mb-2">点击或拖拽文件到此处上传</p>
                            <p class="text-sm text-gray-400 mb-4">支持 PDF、图片等格式 (最大 100MB)</p>
                            <label for="fileInput" class="bg-blue-500 hover:bg-blue-600 text-white px-8 py-3 rounded-lg cursor-pointer">
                                选择文件
                            </label>
                        </div>

                        <!-- 预览状态 -->
                        <div id="previewState" class="absolute inset-0 hidden">
                            <div class="bg-gray-800 text-white px-4 py-3 flex items-center justify-between">
                                <div class="flex items-center gap-3">
                                    <span id="previewFileName"></span>
                                    <span id="previewFileSize" class="text-xs text-gray-400"></span>
                                </div>
                                <div class="flex items-center gap-2">
                                    <label for="fileInput" class="text-xs bg-gray-700 hover:bg-gray-600 px-3 py-1 rounded cursor-pointer">
                                        更换
                                    </label>
                                    <button id="removeFile" class="text-xs bg-red-600 hover:bg-red-700 px-3 py-1 rounded">
                                        移除
                                    </button>
                                </div>
                            </div>
                            <div id="previewContent" class="bg-gray-50 p-2 relative" style="height: 400px;"></div>
                        </div>

                        <input type="file" id="fileInput" style="display:none;">
                    </div>
                </div>

                <!-- 打印设置 -->
                <div class="bg-white rounded-xl shadow-md p-6">
                    <h2 class="text-xl font-semibold text-gray-800 mb-4">⚙️ 打印设置</h2>
                    
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2">选择打印机</label>
                        <select id="printerSelect" class="w-full border border-gray-300 rounded-lg px-4 py-2">
                            <option value="">加载中...</option>
                        </select>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">纸张大小</label>
                            <select id="paperSize" class="w-full border border-gray-300 rounded-lg px-4 py-2">
                                <option value="A4" selected>A4 (210×297mm)</option>
                                <option value="A3">A3 (297×420mm)</option>
                                <option value="A2">A2 (420×594mm)</option>
                                <option value="A1">A1 (594×841mm)</option>
                                <option value="5inch">5寸 (89×127mm)</option>
                                <option value="6inch">6寸 (102×152mm)</option>
                                <option value="7inch">7寸 (127×178mm)</option>
                                <option value="8inch">8寸 (152×203mm)</option>
                                <option value="10inch">10寸 (203×254mm)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">纸张材质</label>
                            <select id="paperType" class="w-full border border-gray-300 rounded-lg px-4 py-2">
                                <option value="plain" selected>普通纸</option>
                                <option value="glossy">光面照片纸</option>
                            </select>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">色彩模式</label>
                            <div class="space-y-2">
                                <label class="flex items-center p-2 border rounded-lg hover:bg-gray-50 cursor-pointer transition">
                                    <input type="radio" name="colorMode" value="color" class="mr-3">
                                    <svg class="w-5 h-5 mr-2 text-blue-500" viewBox="0 0 24 24" fill="currentColor">
                                        <circle cx="12" cy="12" r="10" fill="red"/>
                                        <circle cx="6" cy="18" r="10" fill="green"/>
                                        <circle cx="18" cy="18" r="10" fill="blue"/>
                                    </svg>
                                    <span>彩色</span>
                                </label>
                                <label class="flex items-center p-2 border rounded-lg hover:bg-gray-50 cursor-pointer transition">
                                    <input type="radio" name="colorMode" value="mono" checked class="mr-3">
                                    <svg class="w-5 h-5 mr-2 text-gray-700" viewBox="0 0 24 24" fill="currentColor">
                                        <circle cx="12" cy="12" r="10"/>
                                    </svg>
                                    <span>黑白</span>
                                </label>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">双面打印</label>
                            <div class="space-y-2">
                                <label class="flex items-center p-2 border rounded-lg hover:bg-gray-50 cursor-pointer transition">
                                    <input type="radio" name="duplex" value="one-sided" class="mr-3">
                                    <svg class="w-5 h-5 mr-2 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                                    </svg>
                                    <span>单面</span>
                                </label>
                                <label class="flex items-center p-2 border rounded-lg hover:bg-gray-50 cursor-pointer transition">
                                    <input type="radio" name="duplex" value="two-sided-long-edge" checked class="mr-3">
                                    <svg class="w-5 h-5 mr-2 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" xmlns="http://www.w3.org/2000/svg">
                                        <!-- 长方形A4纸轮廓 -->
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 3h16v18H4z"/>
                                        <!-- 文字横线 -->
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 8h12M6 12h10"/>
                                        <!-- 左方长边虚线（往右移一点） -->
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M0.5 3v18" stroke-dasharray="4 2"/>
                                    </svg>
                                    <span>双面(长边翻页)</span>
                                </label>
                                <label class="flex items-center p-2 border rounded-lg hover:bg-gray-50 cursor-pointer transition">
                                    <input type="radio" name="duplex" value="two-sided-short-edge" class="mr-3">
                                    <svg class="w-5 h-5 mr-2 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" xmlns="http://www.w3.org/2000/svg">
                                        <!-- 长方形A4纸轮廓 -->
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 3h16v18H4z"/>
                                        <!-- 文字横线 -->
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 8h12M6 12h10"/>
                                        <!-- 上方短边虚线（往下移一点） -->
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M0 1.5h24" stroke-dasharray="4 2"/>
                                    </svg>
                                    <span>双面(短边翻页)</span>
                                </label>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">打印方向</label>
                            <div class="space-y-2">
                                <label class="flex items-center p-2 border rounded-lg hover:bg-gray-50 cursor-pointer transition">
                                    <input type="radio" name="orientation" value="portrait" checked class="mr-3">
                                    <svg class="w-5 h-5 mr-2 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                                    </svg>
                                    <span>纵向打印</span>
                                </label>
                                <label class="flex items-center p-2 border rounded-lg hover:bg-gray-50 cursor-pointer transition">
                                    <input type="radio" name="orientation" value="landscape" class="mr-3">
                                    <svg class="w-5 h-5 mr-2 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <!-- 横向A4纸外框（高度压扁） -->
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2 6h20v12H2z"/>
                                        <!-- 横向文字示意（2条线） -->
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 9h16M4 13h14"/>
                                    </svg>
                                    <span>横向打印</span>
                                </label>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">打印份数</label>
                            <input type="number" id="copies" value="1" min="1" max="100" class="w-full border border-gray-300 rounded-lg px-4 py-2">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2">页面范围</label>
                        <input type="text" id="pageRange" placeholder="例如: 1-5,8,10-12" class="w-full border border-gray-300 rounded-lg px-4 py-2">
                    </div>

                    <button id="printBtn" disabled class="w-full bg-blue-500 hover:bg-blue-600 disabled:bg-gray-400 text-white font-semibold py-3 rounded-lg">
                        🖨️ 提交打印
                    </button>

                    <!-- 打印参数详情 -->
                    <div id="printParamsSection" class="mt-4 hidden">
                        <h3 class="text-lg font-semibold text-gray-800 mb-3 flex items-center">
                            <svg class="w-5 h-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/>
                            </svg>
                            打印参数详情
                        </h3>
                        <div id="printParamsContent" class="bg-blue-50 border border-blue-200 rounded-lg p-4 text-sm">
                            <!-- 参数内容将通过JavaScript动态填充 -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- 右侧：文件列表和打印任务 -->
            <div class="space-y-6">
                <div class="bg-white rounded-xl shadow-md p-6">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-semibold text-gray-800">📁 已上传文件</h2>
                        <button id="refreshFiles" class="text-sm text-blue-500 hover:text-blue-700">刷新</button>
                    </div>
                    <div id="filesList" class="space-y-2 max-h-80 overflow-y-auto">
                        <p class="text-gray-500 text-sm text-center py-4">加载中...</p>
                    </div>
                </div>

                <div class="bg-white rounded-xl shadow-md p-6">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-semibold text-gray-800">📋 打印任务</h2>
                        <button id="refreshQueue" class="text-sm text-blue-500 hover:text-blue-700">刷新</button>
                    </div>
                    <div id="jobsList" class="space-y-2 max-h-80 overflow-y-auto">
                        <p class="text-gray-500 text-sm text-center py-4">加载中...</p>
                    </div>
                    
                    <!-- 打印机队列信息 -->
                    <div id="printerQueueSection" class="mt-4 pt-4 border-t border-gray-200">
                        <h3 class="text-lg font-semibold text-gray-800 mb-3 flex items-center">
                            <svg class="w-5 h-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
                            </svg>
                            打印机队列信息
                        </h3>
                        <div id="printerQueueInfo" class="bg-gray-50 rounded-lg p-3 text-sm">
                            <p class="text-gray-500 text-center">请先选择打印机</p>
                        </div>
                    </div>

                    <!-- 纸盒信息 -->
                    <div id="printerTraySection" class="mt-4 pt-4 border-t border-gray-200">
                        <h3 class="text-lg font-semibold text-gray-800 mb-3 flex items-center">
                            <svg class="w-5 h-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
                            </svg>
                            纸盒信息
                        </h3>
                        <div id="printerTrayInfo" class="bg-gray-50 rounded-lg p-3 text-sm">
                            <p class="text-gray-500 text-center">请先选择打印机</p>
                        </div>
                    </div>

                    <!-- 墨盒信息 -->
                    <div id="printerInkSection" class="mt-4 pt-4 border-t border-gray-200">
                        <h3 class="text-lg font-semibold text-gray-800 mb-3 flex items-center">
                            <svg class="w-5 h-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01"/>
                            </svg>
                            墨盒信息
                        </h3>
                        <div id="printerInkInfo" class="bg-gray-50 rounded-lg p-3 text-sm">
                            <p class="text-gray-500 text-center">请先选择打印机</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-4 right-4 bg-gray-800 text-white px-6 py-3 rounded-lg hidden"></div>

    <script>
        let uploadedFile = null;
        let jobs = [];
        let pdfSupport = null;

        document.addEventListener('DOMContentLoaded', () => {
            // 获取DOM元素
            const uploadPreviewContainer = document.getElementById('uploadPreviewContainer');
            const uploadState = document.getElementById('uploadState');
            const previewState = document.getElementById('previewState');
            const fileInput = document.getElementById('fileInput');
            const removeFileBtn = document.getElementById('removeFile');
            const printBtn = document.getElementById('printBtn');
            const refreshFilesBtn = document.getElementById('refreshFiles');
            const refreshQueueBtn = document.getElementById('refreshQueue');

            // 文件上传事件
            if (fileInput) {
                fileInput.addEventListener('change', (e) => {
                    if (e.target.files.length > 0) {
                        handleFile(e.target.files[0]);
                    }
                });
            }

            // 为label元素添加点击事件，防止事件冒泡
            const labelElement = uploadState?.querySelector('label');
            if (labelElement) {
                labelElement.addEventListener('click', (e) => {
                    // label会自动触发fileInput的click()，这里只需要阻止冒泡
                    e.stopPropagation();
                });
            }

            // 点击上传区域触发文件选择（避免重复触发）
            if (uploadState) {
                uploadState.addEventListener('click', (e) => {
                    if (fileInput) {
                        fileInput.click();
                    }
                });
            }

            // 拖拽事件
            if (uploadPreviewContainer) {
                uploadPreviewContainer.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    uploadPreviewContainer.classList.add('dragover');
                });
                uploadPreviewContainer.addEventListener('dragleave', () => {
                    uploadPreviewContainer.classList.remove('dragover');
                });
                uploadPreviewContainer.addEventListener('drop', (e) => {
                    e.preventDefault();
                    uploadPreviewContainer.classList.remove('dragover');
                    if (e.dataTransfer.files.length > 0) {
                        handleFile(e.dataTransfer.files[0]);
                    }
                });
            }

            // 移除文件
            if (removeFileBtn) {
                removeFileBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    uploadedFile = null;
                    if (fileInput) fileInput.value = '';
                    if (uploadState) uploadState.classList.remove('hidden');
                    if (previewState) previewState.classList.add('hidden');
                    const previewContent = document.getElementById('previewContent');
                    if (previewContent) previewContent.innerHTML = '';
                    updatePrintButton();
                });
            }

            // 打印按钮
            if (printBtn) {
                printBtn.addEventListener('click', handlePrint);
            }

            // 刷新按钮
            if (refreshFilesBtn) {
                refreshFilesBtn.addEventListener('click', loadFiles);
            }
            if (refreshQueueBtn) {
                refreshQueueBtn.addEventListener('click', () => {
                    loadJobs();
                    loadPrinterQueue();
                    loadPrinterTrayInfo();
                    loadPrinterInkInfo();
                });
            }

            // 打印机选择变化
            const printerSelect = document.getElementById('printerSelect');
            if (printerSelect) {
                printerSelect.addEventListener('change', () => {
                    loadPrinterQueue();
                    loadPrinterTrayInfo();
                    loadPrinterInkInfo();
                });
            }

            // 初始化
            (async () => {
                // 等待打印机列表加载完成
                await loadPrinters();
                await loadJobs();
                await loadFiles();
                await detectPDFSupport();

                // 延迟加载打印机信息，确保打印机已选择
                setTimeout(async () => {
                    console.log('开始加载打印机信息...');
                    await loadPrinterQueue();
                    await loadPrinterTrayInfo();
                    await loadPrinterInkInfo();
                    console.log('打印机信息加载完成');
                }, 1000);
            })();

            // 添加错误处理的定时器
            setInterval(() => {
                try {
                    loadJobs();
                } catch (e) {
                    console.error('定时加载任务失败:', e);
                }
            }, 5000);

            setInterval(() => {
                try {
                    loadFiles();
                } catch (e) {
                    console.error('定时加载文件失败:', e);
                }
            }, 10000);

            setInterval(() => {
                try {
                    loadPrinterQueue();
                } catch (e) {
                    console.error('定时加载队列失败:', e);
                }
            }, 10000);

            setInterval(() => {
                try {
                    loadPrinterTrayInfo();
                } catch (e) {
                    console.error('定时加载纸盒信息失败:', e);
                }
            }, 10000);

            setInterval(() => {
                try {
                    loadPrinterInkInfo();
                } catch (e) {
                    console.error('定时加载墨盒信息失败:', e);
                }
            }, 10000);
        });

        function detectPDFSupport() {
            pdfSupport = navigator.pdfViewerEnabled !== false;
        }

        async function handleFile(file) {
            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/api/upload', { method: 'POST', body: formData });
                const data = await response.json();

                if (data.success) {
                    uploadedFile = data;
                    document.getElementById('previewFileName').textContent = data.filename;
                    document.getElementById('previewFileSize').textContent = formatFileSize(file.size);
                    
                    const uploadState = document.getElementById('uploadState');
                    const previewState = document.getElementById('previewState');
                    if (uploadState) uploadState.classList.add('hidden');
                    if (previewState) previewState.classList.remove('hidden');
                    
                    updatePrintButton();
                    showToast('文件上传成功', 'success');
                    loadPreview(data.filename);
                } else {
                    showToast('上传失败: ' + data.error, 'error');
                }
            } catch (error) {
                console.error('上传错误:', error);
                showToast('上传失败: ' + error.message, 'error');
            }
        }

        async function loadPreview(filename) {
            const previewContent = document.getElementById('previewContent');
            if (!previewContent) return;

            const ext = filename.split('.').pop().toLowerCase();

            if (['jpg', 'jpeg', 'png', 'gif', 'bmp', 'svg'].includes(ext)) {
                previewContent.innerHTML = `<img src="/api/preview/${encodeURIComponent(filename)}" class="w-full h-full object-contain" alt="预览">`;
            } else if (['pdf', 'doc', 'docx', 'ppt', 'pptx', 'xls', 'xlsx', 'rtf', 'txt'].includes(ext)) {
                // PDF和文档类型使用object标签内嵌显示
                const previewUrl = `/api/preview/${encodeURIComponent(filename)}`;
                
                previewContent.innerHTML = `
                    <div id="loadingIndicator" class="absolute inset-0 flex items-center justify-center bg-gray-50 z-10">
                        <div class="text-gray-500 text-center">
                            <svg class="animate-spin h-8 w-8 mx-auto mb-2" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                            <p>正在加载预览...</p>
                        </div>
                    </div>
                    <object id="pdfObject" 
                            data="${previewUrl}" 
                            type="application/pdf" 
                            class="w-full h-full border-0"
                            style="height: 400px; width: 100%;">
                        <div class="flex flex-col items-center justify-center h-full bg-gray-50 text-center px-4">
                            <svg class="h-12 w-12 mx-auto mb-3 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                            </svg>
                            <p class="mb-2 text-gray-700 font-medium">您的浏览器不支持内嵌PDF预览</p>
                            <p class="mb-4 text-sm text-gray-500">请点击下方按钮在新标签页查看</p>
                            <a href="${previewUrl}" target="_blank" class="inline-flex items-center gap-2 bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg transition">
                                <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
                                </svg>
                                在新标签页打开
                            </a>
                        </div>
                    </object>
                `;
                
                // 延迟检测加载状态
                setTimeout(() => {
                    const pdfObject = document.getElementById('pdfObject');
                    const loadingIndicator = document.getElementById('loadingIndicator');
                    
                    if (!pdfObject || !loadingIndicator) return;
                    
                    let checkCount = 0;
                    const maxChecks = 30; // 15秒
                    
                    const checkLoaded = setInterval(() => {
                        checkCount++;
                        
                        // 获取object元素的样式
                        const computedStyle = getComputedStyle(pdfObject);
                        const width = pdfObject.clientWidth;
                        const height = pdfObject.clientHeight;
                        
                        // 如果object有可见的尺寸，认为加载成功
                        if (width > 0 && height > 0) {
                            clearInterval(checkLoaded);
                            loadingIndicator.classList.add('hidden');
                        }
                        
                        // 超时
                        if (checkCount >= maxChecks) {
                            clearInterval(checkLoaded);
                            loadingIndicator.classList.add('hidden');
                            console.error('PDF加载超时');
                        }
                    }, 500);
                }, 500);
            } else {
                previewContent.innerHTML = `<div class="flex items-center justify-center h-full text-gray-500">暂不支持此文件格式预览</div>`;
            }
        }

        async function handlePrint() {
            const btn = document.getElementById('printBtn');
            if (!btn) return;

            if (!uploadedFile) {
                showToast('请先上传文件', 'error');
                return;
            }

            const printerName = document.getElementById('printerSelect').value;
            if (!printerName) {
                showToast('请选择打印机', 'error');
                return;
            }

            // 获取打印设置
            const colorMode = document.querySelector('input[name="colorMode"]:checked');
            const duplex = document.querySelector('input[name="duplex"]:checked');
            const orientation = document.querySelector('input[name="orientation"]:checked');
            const paperSize = document.getElementById('paperSize');
            const paperType = document.getElementById('paperType');
            const copies = document.getElementById('copies');
            const pageRange = document.getElementById('pageRange');

            if (!colorMode) {
                console.error('未选择色彩模式');
                showToast('请选择色彩模式', 'error');
                return;
            }

            btn.disabled = true;
            btn.textContent = '提交中...';

            try {
                const response = await fetch('/api/print', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        filepath: uploadedFile.filepath,
                        printer: printerName,
                        color_mode: colorMode.value,
                        duplex: duplex ? duplex.value : 'one-sided',
                        orientation: orientation ? orientation.value : 'portrait',
                        paper_size: paperSize ? paperSize.value : 'A4',
                        paper_type: paperType ? paperType.value : 'plain',
                        copies: parseInt(copies.value) || 1,
                        page_range: pageRange ? pageRange.value.trim() : null
                    })
                });

                const data = await response.json();

                if (data.success) {
                    showToast('打印任务提交成功', 'success');
                    // 显示打印参数详情
                    if (data.job) {
                        showPrintParams(data.job);
                    }
                    loadJobs();
                    resetForm();
                } else {
                    showToast('提交失败: ' + data.error, 'error');
                }
            } catch (error) {
                console.error('打印错误:', error);
                showToast('提交失败: ' + error.message, 'error');
            } finally {
                if (btn) {
                    btn.disabled = false;
                    btn.textContent = '🖨️ 提交打印';
                }
            }
        }

        function resetForm() {
            uploadedFile = null;
            const fileInput = document.getElementById('fileInput');
            const uploadState = document.getElementById('uploadState');
            const previewState = document.getElementById('previewState');
            const previewContent = document.getElementById('previewContent');
            
            if (fileInput) fileInput.value = '';
            if (uploadState) uploadState.classList.remove('hidden');
            if (previewState) previewState.classList.add('hidden');
            if (previewContent) previewContent.innerHTML = '';
            
            const pageRange = document.getElementById('pageRange');
            if (pageRange) pageRange.value = '';
            
            updatePrintButton();

            // 隐藏打印参数详情
            const printParamsSection = document.getElementById('printParamsSection');
            if (printParamsSection) {
                printParamsSection.classList.add('hidden');
            }
        }

        async function loadPrinters() {
            console.log('开始加载打印机列表...');
            try {
                const response = await fetch('/api/printers');
                
                if (!response.ok) {
                    throw new Error(`HTTP 错误: ${response.status}`);
                }
                
                const data = await response.json();
                const select = document.getElementById('printerSelect');
                if (!select) {
                    console.error('找不到打印机选择器元素');
                    return;
                }

                select.innerHTML = '';
                
                if (data.printers && data.printers.length > 0) {
                    data.printers.forEach(printer => {
                        const option = document.createElement('option');
                        option.value = printer.name;
                        option.textContent = `${printer.name} (${printer.status})`;
                        select.appendChild(option);
                    });

                    // 自动选择第一台打印机
                    select.selectedIndex = 0;
                    console.log(`成功加载 ${data.printers.length} 台打印机`);
                } else {
                    const option = document.createElement('option');
                    option.value = '';
                    option.textContent = '未检测到打印机';
                    select.appendChild(option);
                    console.log('未检测到可用打印机');
                }
                updatePrintButton();
            } catch (error) {
                console.error('加载打印机失败:', error);
                // 即使出错，也要更新 UI
                const select = document.getElementById('printerSelect');
                if (select) {
                    select.innerHTML = '';
                    const option = document.createElement('option');
                    option.value = '';
                    option.textContent = `加载失败: ${error.message}`;
                    select.appendChild(option);
                }
                showToast('加载打印机列表失败，请检查网络连接', 'error');
            }
            console.log('打印机列表加载完成');
        }

                                    </div>
                                </div>
                                <div class="grid grid-cols-3 gap-2 text-xs">
                                    <div>
                                        <div class="text-gray-500">纸张大小</div>
                                        <div class="font-medium">${tray.paper_size}</div>
                                    </div>
                                    <div>
                                        <div class="text-gray-500">纸张类型</div>
                                        <div class="font-medium">${tray.paper_type}</div>
                                    </div>
                                    <div>
                                        <div class="text-gray-500">纸张余量</div>
                                        <div class="font-medium ${levelColor}">${tray.paper_level}</div>
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('');

                    printerTrayInfo.innerHTML = traysHtml;
                } else {
                    printerTrayInfo.innerHTML = `
                        <div class="text-sm text-gray-500 text-center">
                            未找到纸盒信息
                        </div>
                    `;
                }
            } catch (error) {
                console.error('加载纸盒信息失败:', error);
                printerTrayInfo.innerHTML = `
                    <div class="flex items-center gap-2 text-red-500">
                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                        </svg>
                        <span>加载失败</span>
                    </div>
                `;
            }
        }

        async function loadPrinterInkInfo() {
            const printerSelect = document.getElementById('printerSelect');
            const printerInkInfo = document.getElementById('printerInkInfo');

            if (!printerSelect || !printerInkInfo) return;

            const selectedPrinter = printerSelect.value;
            console.log('loadPrinterInkInfo - selectedPrinter:', selectedPrinter);

            if (!selectedPrinter) {
                printerInkInfo.innerHTML = '<p class="text-gray-500 text-center">请先选择打印机</p>';
                return;
            }

            try {
                const response = await fetch(`/api/printer-ink/${encodeURIComponent(selectedPrinter)}`);
                const data = await response.json();

                if (data.error) {
                    printerInkInfo.innerHTML = `
                        <div class="p-4 bg-red-50 border border-red-200 rounded-lg">
                            <div class="flex items-center gap-2 text-red-600 font-medium mb-2">
                                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                                </svg>
                                <span>获取墨盒信息失败</span>
                            </div>
                            <div class="text-sm text-red-700">
                                <p class="font-medium mb-1">错误详情:</p>
                                <pre class="bg-red-100 p-2 rounded text-xs overflow-auto max-h-40">${data.error}</pre>
                                ${data.details ? `<pre class="bg-red-100 p-2 rounded text-xs mt-2 overflow-auto max-h-40">${data.details}</pre>` : ''}
                            </div>
                        </div>
                    `;
                    return;
                }

                // 检查是否有真实的墨盒信息（非模拟数据）
                const hasRealInkData = data.source && data.source.includes('真实打印机') && data.cartridges && data.cartridges.length > 0;

                console.log('墨盒信息数据源:', data.source);
                console.log('是否有真实墨盒数据:', hasRealInkData);

                // 如果有真实墨盒数据，直接显示
                if (hasRealInkData) {
                    console.log('显示真实墨盒数据');
                    displayInkCartridges(data, printerInkInfo);
                    return;
                }

                // 显示标准墨盒信息（可能包含模拟数据）
                displayInkCartridges(data, printerInkInfo);

            } catch (error) {
                console.error('加载墨盒信息失败:', error);
                printerInkInfo.innerHTML = `
                    <div class="flex items-center gap-2 text-red-500">
                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                        </svg>
                        <span>加载失败</span>
                    </div>
                `;
            }
        }

        // 显示墨盒列表（标准显示）
        function displayInkCartridges(data, container) {
            if (data.cartridges && data.cartridges.length > 0) {
                const cartridgesHtml = data.cartridges.map(cartridge => {
                    // 适配新旧两种格式
                    // 新格式: { name, color: '#000000', type, level }
                    // 旧格式: { color: 'black', color_name, level, status }
                    
                    let colorHex = '';
                    let colorName = '';
                    let level = 0;
                    let status = '正常';

                    if (cartridge.color && cartridge.color.startsWith('#')) {
                        // 新格式
                        colorHex = cartridge.color;
                        colorName = cartridge.name || '未知';
                        level = cartridge.level || 0;
                        status = level > 20 ? '正常' : (level > 0 ? '警告' : '空');
                    } else {
                        // 旧格式
                        switch(cartridge.color) {
                            case 'black':
                                colorHex = '#1f2937';
                                break;
                            case 'cyan':
                                colorHex = '#06b6d4';
                                break;
                            case 'magenta':
                                colorHex = '#ec4899';
                                break;
                            case 'yellow':
                                colorHex = '#eab308';
                                break;
                            case 'color':
                                colorHex = 'linear-gradient(90deg, #06b6d4, #ec4899, #eab308)';
                                break;
                            default:
                                colorHex = '#6b7280';
                        }
                        colorName = cartridge.color_name || cartridge.color || '未知';
                        level = cartridge.level || 0;
                        status = cartridge.status || '正常';
                    }

                    // 根据余量设置进度条颜色
                    let progressColor = 'bg-green-500';
                    if (cartridge.level < 20) {
                        progressColor = 'bg-red-500';
                    } else if (cartridge.level < 50) {
                        progressColor = 'bg-yellow-500';
                    }

                    // 根据状态设置图标
                    let statusIcon = '';
                    if (cartridge.status === '正常' || cartridge.status === 'OK') {
                        statusIcon = '<svg class="w-3 h-3 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>';
                    } else if (cartridge.status === '警告' || cartridge.status === 'Warning') {
                        statusIcon = '<svg class="w-3 h-3 text-yellow-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>';
                    } else {
                        statusIcon = '<svg class="w-3 h-3 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>';
                    }

                    return `
                        <div class="bg-white border rounded-lg p-3 mb-2">
                            <div class="flex items-center justify-between mb-2">
                                <div class="flex items-center gap-2">
                                    <div class="w-4 h-4 rounded" style="background: ${colorHex.startsWith('linear') ? colorHex : colorHex}"></div>
                                    <span class="font-medium">${colorName}</span>
                                </div>
                                <div class="flex items-center gap-1">
                                    ${statusIcon}
                                    <span class="text-xs ${statusClass}">${status}</span>
                                </div>
                            </div>
                            <div class="flex items-center gap-2">
                                <span class="text-xs text-gray-600 w-8">${cartridge.level}%</span>
                                <div class="flex-1 bg-gray-200 rounded-full h-2">
                                    <div class="${progressColor} h-2 rounded-full transition-all" style="width: ${cartridge.level}%"></div>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');

                // 添加数据来源说明
                let sourceNote = '';
                if (data.source) {
                    sourceNote = `<div class="text-xs text-gray-500 mt-2 text-center">${data.source}</div>`;
                }
                if (data.note) {
                    sourceNote += `<div class="text-xs text-gray-500 mt-1 text-center">${data.note}</div>`;
                }

                container.innerHTML = `
                    <div class="space-y-2">
                        ${cartridgesHtml}
                    </div>
                    ${sourceNote}
                `;
            } else {
                container.innerHTML = `
                    <div class="text-sm text-gray-500 text-center">
                        未找到墨盒信息
                    </div>
                `;
            }
        }

        async function loadFiles() {
            console.log('加载文件列表');
            try {
                const response = await fetch('/api/files');
                const data = await response.json();
                const container = document.getElementById('filesList');
                if (!container) return;

                if (!data.files || data.files.length === 0) {
                    container.innerHTML = '<p class="text-gray-500 text-sm text-center py-4">暂无已上传文件</p>';
                    return;
                }

                container.innerHTML = data.files.map(file => `
                    <div class="flex items-center justify-between p-3 bg-gray-50 rounded">
                        <div class="flex-1 min-w-0">
                            <p class="text-sm font-medium text-gray-800 truncate">${file.filename}</p>
                            <p class="text-xs text-gray-500">${formatFileSize(file.size)}</p>
                        </div>
                        <div class="flex items-center gap-2">
                            <button onclick="selectFile('${file.filename}')" class="text-xs text-blue-500 hover:text-blue-700">选择</button>
                            <button onclick="deleteFile('${file.filename}')" class="text-xs text-red-500 hover:text-red-700">删除</button>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('加载文件列表失败:', error);
            }
        }

        async function selectFile(filename) {
            try {
                const response = await fetch('/api/files');
                const data = await response.json();
                const file = data.files.find(f => f.filename === filename);
                if (file) {
                    uploadedFile = { filename: file.filename, filepath: file.filepath };
                    document.getElementById('previewFileName').textContent = file.filename;
                    document.getElementById('previewFileSize').textContent = '已上传文件';
                    
                    const uploadState = document.getElementById('uploadState');
                    const previewState = document.getElementById('previewState');
                    if (uploadState) uploadState.classList.add('hidden');
                    if (previewState) previewState.classList.remove('hidden');
                    
                    loadPreview(file.filename);
                    updatePrintButton();
                    showToast('已选择文件', 'success');
                }
            } catch (error) {
                console.error('选择文件失败:', error);
            }
        }

        async function deleteFile(filename) {
            if (!confirm(`确定要删除文件 "${filename}" 吗？`)) {
                return;
            }

            try {
                const response = await fetch(`/api/files/${filename}`, {
                    method: 'DELETE'
                });
                const data = await response.json();

                if (data.success) {
                    showToast('文件删除成功', 'success');
                    loadFiles();
                } else {
                    showToast('删除失败: ' + data.error, 'error');
                }
            } catch (error) {
                console.error('删除文件失败:', error);
                showToast('删除失败: ' + error.message, 'error');
            }
        }

        async function loadJobs() {
            try {
                const response = await fetch('/api/jobs');
                const data = await response.json();
                jobs = data.jobs || [];
                const container = document.getElementById('jobsList');
                if (!container) return;

                if (jobs.length === 0) {
                    container.innerHTML = '<p class="text-gray-500 text-sm text-center py-4">暂无打印任务</p>';
                    return;
                }

                container.innerHTML = jobs.map(job => `
                    <div class="border rounded-lg p-3 hover:shadow-md transition-shadow">
                        <div class="flex justify-between items-start mb-2 cursor-pointer" onclick="toggleJobDetails('${job.id}')">
                            <div class="flex-1">
                                <p class="font-medium text-sm text-gray-800">${job.filename}</p>
                                <p class="text-xs text-gray-500">${job.printer} | ${job.copies}份</p>
                            </div>
                            <span class="text-xs px-2 py-1 rounded-full ${getStatusColor(job.status)}">${getStatusText(job.status)}</span>
                        </div>

                        <!-- 打印参数详情 -->
                        <div id="job-details-${job.id}" class="hidden mt-3 pt-3 border-t border-gray-200">
                            <div class="grid grid-cols-2 gap-2 text-xs">
                                <div class="flex">
                                    <span class="text-gray-500 w-20">色彩模式:</span>
                                    <span class="text-gray-800">${getColorModeText(job.color_mode)}</span>
                                </div>
                                <div class="flex">
                                    <span class="text-gray-500 w-20">双面打印:</span>
                                    <span class="text-gray-800">${getDuplexText(job.duplex)}</span>
                                </div>
                                <div class="flex">
                                    <span class="text-gray-500 w-20">打印方向:</span>
                                    <span class="text-gray-800">${getOrientationText(job.orientation)}</span>
                                </div>
                                <div class="flex">
                                    <span class="text-gray-500 w-20">纸张大小:</span>
                                    <span class="text-gray-800">${getPaperSizeText(job.paper_size)}</span>
                                </div>
                                <div class="flex">
                                    <span class="text-gray-500 w-20">纸张材质:</span>
                                    <span class="text-gray-800">${getPaperTypeText(job.paper_type)}</span>
                                </div>
                                ${job.page_range ? `
                                <div class="flex col-span-2">
                                    <span class="text-gray-500 w-20">页面范围:</span>
                                    <span class="text-gray-800">${job.page_range}</span>
                                </div>
                                ` : ''}
                            </div>
                            <div class="mt-2 text-xs text-gray-400">
                                任务ID: ${job.id.substring(0, 8)}...
                                ${job.cups_job_id ? ` | CUPS任务ID: ${job.cups_job_id}` : ''}
                            </div>
                            ${job.message ? `
                            <div class="mt-2 p-2 bg-gray-50 rounded text-xs text-gray-600">
                                <span class="font-medium">消息:</span> ${job.message}
                            </div>
                            ` : ''}
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('加载任务列表失败:', error);
            }
        }

        function getStatusColor(status) {
            const colors = {
                'submitted': 'bg-blue-100 text-blue-800',
                'processing': 'bg-yellow-100 text-yellow-800',
                'completed': 'bg-green-100 text-green-800',
                'failed': 'bg-red-100 text-red-800'
            };
            return colors[status] || 'bg-gray-100 text-gray-800';
        }

        function getStatusText(status) {
            const texts = {
                'submitted': '已提交',
                'processing': '处理中',
                'completed': '已完成',
                'failed': '失败'
            };
            return texts[status] || status;
        }

        function getColorModeText(mode) {
            const texts = {
                'color': '彩色',
                'mono': '黑白'
            };
            return texts[mode] || mode;
        }

        function getDuplexText(duplex) {
            const texts = {
                'one-sided': '单面打印',
                'two-sided-long-edge': '双面打印（长边装订）',
                'two-sided-short-edge': '双面打印（短边装订）'
            };
            return texts[duplex] || duplex;
        }

        function getOrientationText(orientation) {
            const texts = {
                'portrait': '纵向',
                'landscape': '横向'
            };
            return texts[orientation] || orientation;
        }

        function getPaperSizeText(size) {
            const texts = {
                'A4': 'A4 (210×297mm)',
                'A3': 'A3 (297×420mm)',
                'A2': 'A2 (420×594mm)',
                'A1': 'A1 (594×841mm)',
                '5inch': '5寸 (89×127mm)',
                '6inch': '6寸 (102×152mm)',
                '7inch': '7寸 (127×178mm)',
                '8inch': '8寸 (152×203mm)',
                '10inch': '10寸 (203×254mm)'
            };
            return texts[size] || size;
        }

        function getPaperTypeText(type) {
            const texts = {
                'plain': '普通纸',
                'glossy': '光面照片纸'
            };
            return texts[type] || type;
        }

        function toggleJobDetails(jobId) {
            const detailsDiv = document.getElementById(`job-details-${jobId}`);
            if (detailsDiv) {
                detailsDiv.classList.toggle('hidden');
            }
        }

        function updatePrintButton() {
            const btn = document.getElementById('printBtn');
            const printer = document.getElementById('printerSelect')?.value;
            if (btn) {
                btn.disabled = !uploadedFile || !printer;
            }
        }

        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(2) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
        }

        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            if (!toast) return;
            
            toast.textContent = message;
            toast.className = 'fixed bottom-4 right-4 px-6 py-3 rounded-lg';
            
            if (type === 'success') {
                toast.classList.add('bg-green-500', 'text-white');
            } else if (type === 'error') {
                toast.classList.add('bg-red-500', 'text-white');
            } else {
                toast.classList.add('bg-gray-800', 'text-white');
            }
            
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }
    </script>
</body>
</html>
